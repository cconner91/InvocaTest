<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Invoca Test Site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff5a00;
      --navy: #0d1b3e;
      --navy-light: #1a2f5e;
      --gray-light: #f5f6f8;
      --gray-mid: #e2e6ed;
      --text: #1e2735;
      --text-muted: #5a6478;
      --white: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--gray-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--white);
      text-decoration: none;
    }

    .logo span { color: var(--orange); }

    nav { display: flex; align-items: center; gap: 32px; }

    nav a {
      color: rgba(255,255,255,.8);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      transition: color .2s;
    }

    nav a:hover { color: var(--white); }

    .header-phone {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--orange);
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .ty-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 56px 44px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .check-wrap {
      width: 72px;
      height: 72px;
      background: rgba(255,90,0,.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .check-wrap svg { color: var(--orange); }

    .ty-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -.5px;
      margin-bottom: 10px;
    }

    .ty-card p {
      font-size: .95rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      border-radius: 7px;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s, transform .15s;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--orange);
      color: var(--white);
      border: none;
    }

    .btn-primary:hover { background: #e04e00; transform: translateY(-1px); }

    .btn-secondary {
      background: var(--white);
      color: var(--navy);
      border: 1.5px solid var(--gray-mid);
    }

    .btn-secondary:hover { background: var(--gray-light); transform: translateY(-1px); }

    .divider {
      border: none;
      border-top: 1px solid var(--gray-mid);
      margin: 32px 0;
    }

    .meta {
      font-size: .78rem;
      color: var(--text-muted);
    }

    /* ── Footer ── */
    footer {
      background: #080f1e;
      color: rgba(255,255,255,.4);
      text-align: center;
      padding: 20px 40px;
      font-size: .8rem;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <a class="logo" href="index.html">In<span>voca</span> <span style="font-weight:300;font-size:.85em;opacity:.6">Test</span></a>

    <nav>
      <a href="index.html">Home</a>
      <a href="form.html">Contact</a>
    </nav>

    <a class="header-phone" href="tel:+18005550001">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.6 16.92z"/></svg>
      (800) 555-0001
    </a>
  </header>

  <!-- ── Thank You ── -->
  <main>
    <div class="ty-card">

      <div class="check-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1>Submission Received</h1>
      <p>Thanks for reaching out. Your form was submitted and the API call fired successfully.<br>You'll hear back shortly.</p>

      <div class="btn-group">
        <a class="btn btn-secondary" href="index.html">&larr; Back to Home</a>
        <a class="btn btn-primary" href="form.html">Submit Another</a>
      </div>

      <hr class="divider" />

      <p class="meta">Test submission &mdash; no real data was processed.</p>

    </div>
  </main>

  <footer>
    &copy; 2026 Invoca Test Site &mdash; Internal use only
  </footer>

</body>
</html>
